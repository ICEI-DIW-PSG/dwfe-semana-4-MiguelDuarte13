<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NexoPlay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">NexoPlay</div>

  <form class="search-form">
    <input type="text" placeholder="Buscar vídeos...">
    <button type="submit">Buscar</button>
  </form>

  <div class="auth-buttons">
    <button>Login</button>
    <button>Signup</button>
  </div>
</header>

<nav class="menu">
  <ul>
    <li>Home</li>
    <li>Trending</li>
    <li>Categorias</li>
    <li>Favoritos</li>
  </ul>
</nav>

<main class="main-content">

  <section class="banner">
    <img src="https://picsum.photos/id/1015/900/250" alt="Banner">
  </section>

  <section class="videos">
    <h2>Opções de video</h2>

    <div class="video-grid">

      <article class="card">
        <img src="https://picsum.photos/id/1/200/150">
        <p>Vídeo 1</p>
      </article>

      <article class="card">
        <img src="https://picsum.photos/id/2/200/150">
        <p>Vídeo 2</p>
      </article>

      <article class="card">
        <img src="https://picsum.photos/id/3/200/150">
        <p>Vídeo 3</p>
      </article>

      <article class="card">
        <img src="https://picsum.photos/id/4/200/150">
        <p>Vídeo 4</p>
      </article>

    </div>
  </section>

  <section class="videos">
    <h2>Recentes</h2>

    <div class="video-grid">

      <article class="card">
        <img src="https://picsum.photos/id/5/200/150">
        <p>Vídeo 5</p>
      </article>

      <article class="card">
        <img src="https://picsum.photos/id/6/200/150">
        <p>Vídeo 6</p>
      </article>

      <article class="card">
        <img src="https://picsum.photos/id/7/200/150">
        <p>Vídeo 7</p>
      </article>

      <article class="card">
        <img src="https://picsum.photos/id/8/200/150">
        <p>Vídeo 8</p>
      </article>

    </div>
  </section>

</main>

<footer class="footer">
  <p>© 2026 NexoPlay - Todos os direitos reservados</p>
</footer>

</body>
</html>
